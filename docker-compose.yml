# 开发/生产共用的基础配置。生产环境额外叠加 docker-compose.prod.yml：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# 服务拓扑：nginx -> frontend (Next.js) / nginx -> /api、/uploads -> backend 及其挂载卷
#           frontend 与 backend 之间只通过内部 Docker 网络通信，互相以服务名访问

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=file:/app/data/production.db
      - UPLOAD_DIR=/app/uploads
      - HOST=0.0.0.0
      - BACKEND_PORT=4000
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # 构建期尽量让前端能连上后端一起做静态生成；即使连不上，各页面也有兜底逻辑不会构建失败
      # （见 frontend/src/lib/api/*.ts 中的 try/catch 说明）。
      network: internal
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
        NEXT_PUBLIC_UPLOADS_BASE_URL: ${NEXT_PUBLIC_UPLOADS_BASE_URL:-}
        INTERNAL_API_BASE_URL: http://backend:4000
    environment:
      - INTERNAL_API_BASE_URL=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:stable-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./uploads:/usr/share/nginx/uploads:ro
      - ./nginx/certbot-webroot:/var/www/certbot:ro
      - ./nginx/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
