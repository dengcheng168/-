# 开发/生产共用的基础配置。生产环境额外叠加 docker-compose.prod.yml：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# 服务拓扑：nginx -> frontend (Next.js) / nginx -> /api、/uploads -> backend 及其挂载卷
#           frontend 与 backend 之间只通过内部 Docker 网络通信，互相以服务名访问

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=file:/app/data/production.db
      - UPLOAD_DIR=/app/uploads
      - HOST=0.0.0.0
      - BACKEND_PORT=4000
      # 保存正式站点域名后，后端调用前端容器（同一 Docker 网络内用服务名访问）触发缓存刷新，
      # 见 backend/src/lib/revalidate-frontend.ts；REVALIDATE_SECRET 必须和 frontend 那份一致
      - FRONTEND_BASE_URL=http://frontend:3000
      - REVALIDATE_SECRET=${REVALIDATE_SECRET:-}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # 构建期前端连不上后端也没关系，各页面都有兜底逻辑不会构建失败
      # （见 frontend/src/lib/api/*.ts 中的 try/catch 说明）。
      # 注意：不要在这里加 network: internal ——较新的 docker compose 默认用 buildx bake 构建，
      # 不支持给构建步骤挂自定义命名网络，会直接报错 "network mode ... not supported by buildkit"。
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
        NEXT_PUBLIC_UPLOADS_BASE_URL: ${NEXT_PUBLIC_UPLOADS_BASE_URL:-}
        INTERNAL_API_BASE_URL: http://backend:4000
    environment:
      - INTERNAL_API_BASE_URL=http://backend:4000
      # 运行时故障回退（不是 NEXT_PUBLIC_*，不会打进构建产物）：后台"SEO 设置 -> 正式站点域名"
      # 优先于这个值；这个值优先于构建时写死的 NEXT_PUBLIC_SITE_URL。修改这里之后只需要
      # docker compose restart frontend，不需要重新 build。见 frontend/src/lib/site/get-site-base-url.ts
      - SITE_URL=${SITE_URL:-}
      # 必须和 backend 服务的 REVALIDATE_SECRET 取值一致，用于校验 backend 调用
      # /api/internal/revalidate-site-config 的请求
      - REVALIDATE_SECRET=${REVALIDATE_SECRET:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:stable-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./uploads:/usr/share/nginx/uploads:ro
      - ./nginx/certbot-webroot:/var/www/certbot:ro
      - ./nginx/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
